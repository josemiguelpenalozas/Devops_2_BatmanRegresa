services:
  mysql_ventas:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE_VENTAS}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql_despachos:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE_DESPACHOS}
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend_ventas:
    build: ./back-Ventas_SpringBoot
    ports:
      - "8080:8080"
    environment:
      DB_ENDPOINT: mysql_ventas
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE_VENTAS}
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      mysql_ventas:
        condition: service_healthy

  backend_despachos:
    build: ./back-Despachos_SpringBoot
    ports:
      - "8081:8081"
    environment:
      DB_ENDPOINT: mysql_despachos
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE_DESPACHOS}
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      mysql_despachos:
        condition: service_healthy

  frontend:
    build: ./front_despacho
    ports:
      - "3000:80"
    depends_on:
      - backend_ventas
      - backend_despachos
