name: Integración Continua Batman Regresa

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop

jobs:

  test-frontend:
    name: Tests Frontend (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front_despacho/package-lock.json

      - name: Instalar dependencias
        working-directory: front_despacho
        run: npm ci

      - name: Ejecutar tests con Vitest
        working-directory: front_despacho
        run: npm test

  test-backend-ventas:
    name: Tests Backend Ventas (JUnit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ejecutar tests unitarios (sin contexto Spring)
        working-directory: back-Ventas_SpringBoot/Springboot-API-REST
        run: |
          mvn test \
            -Dtest=VentaServiceTest \
            -DfailIfNoTests=false \
            --no-transfer-progress

  test-backend-despachos:
    name: Tests Backend Despachos (JUnit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ejecutar tests unitarios (sin contexto Spring)
        working-directory: back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        run: |
          mvn test \
            -Dtest=DespachoServiceTest \
            -DfailIfNoTests=false \
            --no-transfer-progress